  <line x1="253" y1="55" x2="253" y2="148" stroke-width="1"/>
  <line x1="332" y1="55" x2="332" y2="148" stroke-width="1"/>
  <line x1="411" y1="55" x2="411" y2="148" stroke-width="1"/>
  <line x1="490" y1="55" x2="490" y2="148" stroke-width="1"/>
  <line x1="569" y1="55" x2="569" y2="148" stroke-width="1"/>
  <line x1="648" y1="55" x2="648" y2="148" stroke-width="1"/>
  <line x1="727" y1="55" x2="727" y2="148" stroke-width="1"/>

  <!-- Horizontal mid-rail in curtain wall -->
  <line x1="95" y1="101" x2="805" y2="101" stroke-width="0.8" stroke-opacity="0.7"/>

