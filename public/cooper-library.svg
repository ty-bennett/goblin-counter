  <path d="M797 188 Q784 172 794 158 Q788 142 805 138 Q810 122 829 126 Q839 112 855 120 Q869 108 875 124 Q887 120 886 137 Q894 143 889 158 Q896 172 883 184 Q872 196 855 196 Q839 200 823 196 Q806 200 797 188Z" stroke-width="1" stroke-opacity="0.8"/>
